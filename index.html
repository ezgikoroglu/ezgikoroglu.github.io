<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolyom | GoNFC</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6200ee;
            --dark: #121212;
            --text: #ffffff;
        }
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            padding: 20px;
            max-width: 400px;
            width: 90%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 20px;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 10px 0;
            font-size: 24px;
        }
        p {
            color: #b0b0b0;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-card {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .link-card:hover {
            transform: scale(1.05);
            background: #7722ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Buraya kendi profil fotoğrafı linkinizi koyabilirsiniz -->
        <img src="https://via.placeholder.com/150" alt="Profil" class="profile-img">
        <h1>ADINIZ SOYADINIZ</h1>
        <p>Flutter Developer | NFC Teknoloji Meraklısı</p>
        
        <div class="links">
            <a href="https://github.com/KULLANICI_ADINIZ" class="link-card">GitHub Projelerim</a>
            <a href="https://linkedin.com/in/KULLANICI_ADINIZ" class="link-card">LinkedIn Profilim</a>
            <a href="mailto:eposta@adresiniz.com" class="link-card">Bana Ulaşın</a>
        </div>
    </div>
</body>
</html>
